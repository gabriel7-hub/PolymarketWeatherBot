# Station registry for Polymarket weather temperature markets.
#
# IMPORTANT: Polymarket resolves each market against the highest temperature
# recorded at a SPECIFIC station (read from the market description / Wunderground
# URL), rounded to whole degrees Celsius. The bot should parse the station code
# from each market's description at runtime; this file is the coordinate lookup
# keyed by the Wunderground/ICAO station code that appears in the resolution URL.
#
# Verify each entry against a live market description before trading real size.

